name: Test Scheduler

on:
  workflow_dispatch:

  schedule:
    - cron: "0 11 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run Python
        run: python main.py
